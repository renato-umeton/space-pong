<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Ping Pong</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        // --- Canvas Setup (fullscreen) ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- Constants ---
        const COLORS = {
            bg: '#050510',
            paddle1: '#00d4ff',
            paddle1glow: 'rgba(0, 212, 255, 0.3)',
            paddle2: '#ff00aa',
            paddle2glow: 'rgba(255, 0, 170, 0.3)',
            ball: '#ffffff',
            ballGlow: 'rgba(255, 255, 255, 0.4)',
            line: 'rgba(255, 255, 255, 0.07)',
            text: '#ffffff',
            textDim: 'rgba(255, 255, 255, 0.5)',
            coin: '#ffd700',
            diamond: '#b9f2ff',
            shopBg: 'rgba(5, 5, 16, 0.85)',
            buttonBg: 'rgba(255, 255, 255, 0.08)',
            buttonHover: 'rgba(255, 255, 255, 0.15)',
            affordable: '#44ff88',
            unaffordable: 'rgba(255, 255, 255, 0.2)',
        };

        const PADDLE_W_RATIO = 0.012;
        const PADDLE_H_RATIO = 0.25;
        const BALL_SIZE_RATIO = 0.012;
        const PADDLE_SPEED_RATIO = 0.012;
        const BALL_SPEED_INITIAL_RATIO = 0.005;
        const BALL_SPEED_INCREMENT_RATIO = 0.0004;
        const BALL_SPEED_MAX_RATIO = 0.012;
        const PADDLE_MARGIN_RATIO = 0.03;
        const WIN_SCORE = 11;
        const SCORED_PAUSE_FRAMES = 90;

        // Upgrade definitions
        const UPGRADES = [
            { name: 'PADDLE SIZE', key1: 'Digit1', key2: 'Digit8', costs: [3, 5, 8], currency: 'coins', icon: '\u2195' },
            { name: 'PADDLE SPEED', key1: 'Digit2', key2: 'Digit9', costs: [3, 5, 8], currency: 'coins', icon: '\u26A1' },
            { name: 'BALL BOOST', key1: 'Digit3', key2: 'Digit0', costs: [4, 7, 10], currency: 'coins', icon: '\u2B24' },
            { name: 'MULTI-BALL', key1: 'Digit4', key2: 'Minus', costs: [2, 3, 5], currency: 'diamonds', icon: '\u2726' },
        ];

        // Upgrade multiplier: level 0=1.0, 1=1.25, 2=1.5, 3=1.75
        function upgradeMultiplier(level) {
            return 1 + level * 0.25;
        }

        // Ball boost multiplier: level 0=1.0, 1=1.15, 2=1.30, 3=1.45
        function ballBoostMultiplier(level) {
            return 1 + level * 0.15;
        }

        function getScale() {
            const w = canvas.width;
            const h = canvas.height;
            return {
                paddleW: Math.round(w * PADDLE_W_RATIO),
                paddleH: Math.round(h * PADDLE_H_RATIO),
                ballSize: Math.max(8, Math.round(Math.min(w, h) * BALL_SIZE_RATIO)),
                paddleSpeed: h * PADDLE_SPEED_RATIO,
                ballSpeedInitial: w * BALL_SPEED_INITIAL_RATIO,
                ballSpeedIncrement: w * BALL_SPEED_INCREMENT_RATIO,
                ballSpeedMax: w * BALL_SPEED_MAX_RATIO,
                paddleMargin: Math.round(w * PADDLE_MARGIN_RATIO),
            };
        }

        function getPlayerPaddleH(player) {
            const s = getScale();
            return Math.round(s.paddleH * upgradeMultiplier(state.upgrades[player][0]));
        }

        function getPlayerPaddleSpeed(player) {
            const s = getScale();
            return s.paddleSpeed * upgradeMultiplier(state.upgrades[player][1]);
        }

        // --- Stars ---
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random(),
                y: Math.random(),
                size: Math.random() * 2 + 0.5,
                brightness: Math.random() * 0.6 + 0.2,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleOffset: Math.random() * Math.PI * 2,
            });
        }

        // --- Ball Trail ---
        const ballTrail = [];
        const TRAIL_LENGTH = 12;

        // --- Touch Input ---
        const touches = {}; // active touches by identifier
        let touchP1Y = null; // target Y for player 1 (left side touch)
        let touchP2Y = null; // target Y for player 2 (right side touch)

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                touches[t.identifier] = { x: t.clientX, y: t.clientY };
                handleTouchAt(t.clientX, t.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                touches[t.identifier] = { x: t.clientX, y: t.clientY };
            }
            updateTouchPaddles();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                const wasTouch = touches[t.identifier];
                delete touches[t.identifier];
                // Clear paddle targets if no touches remain on that side
                if (wasTouch) {
                    let hasLeft = false, hasRight = false;
                    for (const id in touches) {
                        if (touches[id].x < canvas.width / 2) hasLeft = true;
                        else hasRight = true;
                    }
                    if (!hasLeft) touchP1Y = null;
                    if (!hasRight) touchP2Y = null;
                }
            }
        }, { passive: false });

        function handleTouchAt(x, y) {
            // Simulate click for buttons
            mouse.x = x;
            mouse.y = y;
            mouse.clicked = true;
        }

        function updateTouchPaddles() {
            for (const id in touches) {
                const t = touches[id];
                if (state.gameMode === '1P') {
                    // In 1P mode, any touch controls player 1
                    touchP1Y = t.y;
                } else {
                    // In 2P mode, left half = P1, right half = P2
                    if (t.x < canvas.width / 2) {
                        touchP1Y = t.y;
                    } else {
                        touchP2Y = t.y;
                    }
                }
            }
        }

        // --- Game State ---
        const state = {
            gameMode: null, // '1P' | '2P'
            phase: 'TITLE', // TITLE | MODE_SELECT | PLAYING | SCORED | PAUSED | CONFIRM_HOME | GAME_OVER
            pauseTimer: 0,
            paddle1: { x: 0, y: 0 },
            paddle2: { x: 0, y: 0 },
            ball: { x: 0, y: 0, vx: 0, vy: 0, speed: 0 },
            score: { p1: 0, p2: 0 },
            currency: {
                p1: { coins: 0, diamonds: 0 },
                p2: { coins: 0, diamonds: 0 },
            },
            upgrades: {
                p1: [0, 0, 0, 0], // levels for each upgrade
                p2: [0, 0, 0, 0],
            },
            time: 0,
            phaseBeforePause: null,
            hoverButton: null, // for mouse hover tracking
        };

        function resetPaddlePositions() {
            const s = getScale();
            state.paddle1.x = s.paddleMargin;
            state.paddle1.y = canvas.height / 2 - s.paddleH / 2;
            state.paddle2.x = canvas.width - s.paddleMargin - s.paddleW;
            state.paddle2.y = canvas.height / 2 - s.paddleH / 2;
        }

        resetPaddlePositions();

        // --- Input ---
        const keys = {};
        const keyJustPressed = {};

        document.addEventListener('keydown', (e) => {
            if (!keys[e.code]) keyJustPressed[e.code] = true;
            keys[e.code] = true;
            if (e.code === 'Space') e.preventDefault();
            if (e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Mouse tracking for buttons
        const mouse = { x: 0, y: 0, clicked: false };

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.clicked = true;
        });

        function consumeKey(code) {
            const v = keyJustPressed[code];
            keyJustPressed[code] = false;
            return v;
        }

        // --- Button hit testing ---
        const buttons = {}; // populated each frame by draw functions

        function registerButton(id, x, y, w, h) {
            buttons[id] = { x, y, w, h };
        }

        function isButtonHovered(id) {
            const b = buttons[id];
            if (!b) return false;
            return mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h;
        }

        function isButtonClicked(id) {
            return mouse.clicked && isButtonHovered(id);
        }

        // --- AI ---
        const AI_REACTION_DELAY = 0.06; // smoothing factor (lower = slower reaction)
        let aiTargetY = null;
        let aiUpdateTimer = 0;

        function updateAI() {
            const s = getScale();
            const h2 = getPlayerPaddleH('p2');
            const paddleCenter = state.paddle2.y + h2 / 2;

            // Only track ball when it's moving toward AI
            if (state.ball.vx > 0) {
                // Predict where ball will arrive at paddle x
                const distX = state.paddle2.x - state.ball.x;
                const timeToArrive = distX / state.ball.vx;
                let predictedY = state.ball.y + state.ball.vy * timeToArrive;

                // Bounce prediction off walls
                const bounces = 3;
                let py = predictedY;
                for (let i = 0; i < bounces; i++) {
                    if (py < 0) py = -py;
                    if (py > canvas.height) py = 2 * canvas.height - py;
                }

                // Add slight imperfection
                const imperfection = (Math.sin(state.time * 0.03) * h2 * 0.3);
                aiTargetY = py + imperfection;
            } else {
                // Ball moving away: drift toward center
                aiTargetY = canvas.height / 2;
            }

            if (aiTargetY !== null) {
                const diff = aiTargetY - paddleCenter;
                const sp2 = getPlayerPaddleSpeed('p2');
                const move = Math.sign(diff) * Math.min(Math.abs(diff) * AI_REACTION_DELAY * 3, sp2);
                state.paddle2.y += move;
            }

            state.paddle2.y = Math.max(0, Math.min(canvas.height - h2, state.paddle2.y));
        }

        // --- Paddles ---
        function updatePaddles() {
            const sp1 = getPlayerPaddleSpeed('p1');
            const sp2 = getPlayerPaddleSpeed('p2');
            const h1 = getPlayerPaddleH('p1');
            const h2 = getPlayerPaddleH('p2');

            // Keyboard controls
            if (keys['KeyW']) state.paddle1.y -= sp1;
            if (keys['KeyS']) state.paddle1.y += sp1;

            // Touch controls for P1
            if (touchP1Y !== null) {
                const targetY = touchP1Y - h1 / 2;
                const diff = targetY - state.paddle1.y;
                state.paddle1.y += diff * 0.25; // smooth follow
            }

            if (state.gameMode === '1P') {
                // AI controls P2
                updateAI();
            } else {
                // Keyboard controls for P2
                if (keys['ArrowUp']) state.paddle2.y -= sp2;
                if (keys['ArrowDown']) state.paddle2.y += sp2;

                // Touch controls for P2
                if (touchP2Y !== null) {
                    const targetY = touchP2Y - h2 / 2;
                    const diff = targetY - state.paddle2.y;
                    state.paddle2.y += diff * 0.25;
                }

                state.paddle2.y = Math.max(0, Math.min(canvas.height - h2, state.paddle2.y));
            }

            state.paddle1.y = Math.max(0, Math.min(canvas.height - h1, state.paddle1.y));
        }

        function drawPaddle(x, y, w, h, color, glowColor) {
            ctx.shadowColor = color;
            ctx.shadowBlur = 25;
            ctx.fillStyle = glowColor;
            ctx.beginPath();
            ctx.roundRect(x - 4, y - 4, w + 8, h + 8, 6);
            ctx.fill();

            ctx.shadowBlur = 15;
            const grad = ctx.createLinearGradient(x, y, x + w, y);
            grad.addColorStop(0, color);
            grad.addColorStop(1, shiftColor(color, 30));
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 4);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            ctx.roundRect(x + 2, y + 4, w - 4, h / 3, 3);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }

        function drawPaddles() {
            const s = getScale();
            drawPaddle(state.paddle1.x, state.paddle1.y, s.paddleW, getPlayerPaddleH('p1'), COLORS.paddle1, COLORS.paddle1glow);
            drawPaddle(state.paddle2.x, state.paddle2.y, s.paddleW, getPlayerPaddleH('p2'), COLORS.paddle2, COLORS.paddle2glow);
        }

        // --- Ball ---
        // Extra balls from multi-ball upgrade (each has same structure as state.ball + trail)
        const extraBalls = [];

        function createBallObj(x, y, vx, vy, speed) {
            return { x: x, y: y, vx: vx, vy: vy, speed: speed, trail: [] };
        }

        function resetBall(direction) {
            const s = getScale();
            state.ball.x = canvas.width / 2 - s.ballSize / 2;
            state.ball.y = canvas.height / 2 - s.ballSize / 2;
            state.ball.speed = s.ballSpeedInitial;
            ballTrail.length = 0;

            const angle = (Math.random() * 0.8 - 0.4);
            state.ball.vx = Math.cos(angle) * state.ball.speed * direction;
            state.ball.vy = Math.sin(angle) * state.ball.speed;

            // Spawn extra balls from multi-ball upgrade (one-time use per purchase)
            extraBalls.length = 0;
            const scorer = direction > 0 ? 'p1' : 'p2';
            const mbLevel = state.upgrades[scorer][3];
            if (mbLevel > 0) {
                for (let i = 0; i < mbLevel; i++) {
                    const extraAngle = (Math.random() * 1.2 - 0.6);
                    const eb = createBallObj(
                        state.ball.x,
                        state.ball.y,
                        Math.cos(extraAngle) * state.ball.speed * direction,
                        Math.sin(extraAngle) * state.ball.speed,
                        state.ball.speed
                    );
                    extraBalls.push(eb);
                }
                // Reset multi-ball level after use (one-time)
                state.upgrades[scorer][3] = 0;
            }
        }

        function updateSingleBall(b, s, isExtra) {
            if (!isExtra) {
                ballTrail.push({ x: b.x, y: b.y });
                if (ballTrail.length > TRAIL_LENGTH) ballTrail.shift();
            } else {
                b.trail.push({ x: b.x, y: b.y });
                if (b.trail.length > TRAIL_LENGTH) b.trail.shift();
            }

            b.x += b.vx;
            b.y += b.vy;

            if (b.y <= 0) {
                b.y = 0;
                b.vy = -b.vy;
            }
            if (b.y + s.ballSize >= canvas.height) {
                b.y = canvas.height - s.ballSize;
                b.vy = -b.vy;
            }

            // Paddle 1 collision
            const p1 = state.paddle1;
            const p1H = getPlayerPaddleH('p1');
            if (
                b.vx < 0 &&
                b.x <= p1.x + s.paddleW &&
                b.x + s.ballSize >= p1.x &&
                b.y + s.ballSize >= p1.y &&
                b.y <= p1.y + p1H
            ) {
                b.x = p1.x + s.paddleW;
                const hitPos = ((b.y + s.ballSize / 2) - (p1.y + p1H / 2)) / (p1H / 2);
                b.speed = Math.min(b.speed + s.ballSpeedIncrement, s.ballSpeedMax);
                const boostMult = ballBoostMultiplier(state.upgrades.p1[2]);
                const finalSpeed = b.speed * boostMult;
                const angle = hitPos * (Math.PI / 4);
                b.vx = Math.cos(angle) * finalSpeed;
                b.vy = Math.sin(angle) * finalSpeed;
                state.currency.p1.coins++;
            }

            // Paddle 2 collision
            const p2 = state.paddle2;
            const p2H = getPlayerPaddleH('p2');
            if (
                b.vx > 0 &&
                b.x + s.ballSize >= p2.x &&
                b.x <= p2.x + s.paddleW &&
                b.y + s.ballSize >= p2.y &&
                b.y <= p2.y + p2H
            ) {
                b.x = p2.x - s.ballSize;
                const hitPos = ((b.y + s.ballSize / 2) - (p2.y + p2H / 2)) / (p2H / 2);
                b.speed = Math.min(b.speed + s.ballSpeedIncrement, s.ballSpeedMax);
                const boostMult = ballBoostMultiplier(state.upgrades.p2[2]);
                const finalSpeed = b.speed * boostMult;
                const angle = hitPos * (Math.PI / 4);
                b.vx = -Math.cos(angle) * finalSpeed;
                b.vy = Math.sin(angle) * finalSpeed;
                state.currency.p2.coins++;
            }

            // Scoring -- returns 'p1' or 'p2' if scored, null otherwise
            if (b.x + s.ballSize < 0) return 'p2';
            if (b.x > canvas.width) return 'p1';
            return null;
        }

        function updateBall() {
            const s = getScale();

            // Update main ball
            const mainScore = updateSingleBall(state.ball, s, false);
            if (mainScore) {
                state.score[mainScore]++;
                state.currency[mainScore].diamonds++;
                extraBalls.length = 0;
                if (state.score[mainScore] >= WIN_SCORE) {
                    state.phase = 'GAME_OVER';
                } else {
                    state.phase = 'SCORED';
                    state.pauseTimer = SCORED_PAUSE_FRAMES;
                    resetBall(mainScore === 'p1' ? 1 : -1);
                }
                return;
            }

            // Update extra balls
            for (let i = extraBalls.length - 1; i >= 0; i--) {
                const scored = updateSingleBall(extraBalls[i], s, true);
                if (scored) {
                    state.score[scored]++;
                    state.currency[scored].diamonds++;
                    extraBalls.splice(i, 1);
                    if (state.score[scored] >= WIN_SCORE) {
                        state.phase = 'GAME_OVER';
                        extraBalls.length = 0;
                        return;
                    }
                }
            }
        }

        function drawSingleBall(b, s, trail, color, glowAlpha) {
            // Trail
            for (let i = 0; i < trail.length; i++) {
                const t = trail[i];
                const alpha = (i / trail.length) * 0.3 * glowAlpha;
                const size = s.ballSize * (0.5 + 0.5 * (i / trail.length));
                ctx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
                ctx.beginPath();
                ctx.arc(t.x + s.ballSize / 2, t.y + s.ballSize / 2, size / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Glow
            ctx.shadowColor = color;
            ctx.shadowBlur = 20 * glowAlpha;
            ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.4 * glowAlpha) + ')';
            ctx.beginPath();
            ctx.arc(b.x + s.ballSize / 2, b.y + s.ballSize / 2, s.ballSize, 0, Math.PI * 2);
            ctx.fill();

            // Ball
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(b.x + s.ballSize / 2, b.y + s.ballSize / 2, s.ballSize / 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }

        function drawBall() {
            const s = getScale();
            // Draw extra balls first (dimmer)
            for (const eb of extraBalls) {
                drawSingleBall(eb, s, eb.trail, '#aaaaaa', 0.6);
            }
            // Main ball
            drawSingleBall(state.ball, s, ballTrail, COLORS.ball, 1.0);
        }

        // --- Background ---
        function drawBackground() {
            const grad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width * 0.7
            );
            grad.addColorStop(0, '#0a0a2e');
            grad.addColorStop(1, '#050510');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (const star of stars) {
                const twinkle = Math.sin(state.time * star.twinkleSpeed + star.twinkleOffset) * 0.3 + 0.7;
                const alpha = star.brightness * twinkle;
                ctx.fillStyle = 'rgba(255, 255, 255, ' + alpha + ')';
                ctx.beginPath();
                ctx.arc(star.x * canvas.width, star.y * canvas.height, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.setLineDash([15, 15]);
            ctx.strokeStyle = COLORS.line;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // --- HUD (top bar with buttons + score + currency) ---
        function drawHUD() {
            const w = canvas.width;
            const barH = 60;
            const btnSize = 36;
            const btnY = (barH - btnSize) / 2;
            const btnPad = 16;
            const isInGame = state.phase === 'PLAYING' || state.phase === 'SCORED' || state.phase === 'PAUSED' || state.phase === 'CONFIRM_HOME';

            // Transparent bar background
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, w, barH);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, barH);
            ctx.lineTo(w, barH);
            ctx.stroke();

            if (isInGame) {
                // Home button (left)
                const homeX = btnPad;
                registerButton('home', homeX, btnY, btnSize, btnSize);
                drawIconButton(homeX, btnY, btnSize, 'home', isButtonHovered('home'));

                // Pause button (right)
                const pauseX = w - btnPad - btnSize;
                registerButton('pause', pauseX, btnY, btnSize, btnSize);
                const isPaused = state.phase === 'PAUSED' || state.phase === 'CONFIRM_HOME';
                drawIconButton(pauseX, btnY, btnSize, isPaused ? 'play' : 'pause', isButtonHovered('pause'));

                // Score (center)
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '900 ' + Math.max(28, w * 0.025) + 'px Orbitron, monospace';
                ctx.shadowColor = COLORS.paddle1;
                ctx.shadowBlur = 15;
                ctx.fillStyle = COLORS.paddle1;
                ctx.fillText(state.score.p1.toString(), w * 0.4, barH / 2);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                ctx.fillStyle = COLORS.textDim;
                ctx.font = '400 ' + Math.max(20, w * 0.018) + 'px Orbitron, monospace';
                ctx.fillText(':', w * 0.5, barH / 2 - 2);

                ctx.shadowColor = COLORS.paddle2;
                ctx.shadowBlur = 15;
                ctx.fillStyle = COLORS.paddle2;
                ctx.font = '900 ' + Math.max(28, w * 0.025) + 'px Orbitron, monospace';
                ctx.fillText(state.score.p2.toString(), w * 0.6, barH / 2);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Currency displays
                const currFontSize = Math.max(11, w * 0.01);

                // P1 currency (left of score)
                ctx.textAlign = 'right';

                ctx.fillStyle = COLORS.diamond;
                ctx.fillText(state.currency.p1.diamonds + ' D', w * 0.32, barH / 2 + 8);

                // P2 currency (right of score)
                ctx.textAlign = 'left';

                ctx.fillText(state.currency.p2.coins + ' C', w * 0.68, barH / 2 - 8);

        function drawIconButton(x, y, size, icon, hovered) {
            // Button background
            ctx.fillStyle = hovered ? COLORS.buttonHover : COLORS.buttonBg;
            ctx.beginPath();
            ctx.roundRect(x, y, size, size, 8);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, size, size, 8);
            ctx.stroke();

            // Icon
            const cx = x + size / 2;
            const cy = y + size / 2;
            const s = size * 0.28;
            ctx.fillStyle = hovered ? '#ffffff' : 'rgba(255, 255, 255, 0.7)';
            ctx.strokeStyle = hovered ? '#ffffff' : 'rgba(255, 255, 255, 0.7)';
            ctx.lineWidth = 2;

            if (icon === 'home') {
                // House icon
                ctx.beginPath();
                ctx.moveTo(cx, cy - s);
                ctx.lineTo(cx + s, cy);
                ctx.lineTo(cx + s * 0.6, cy);
                ctx.lineTo(cx + s * 0.6, cy + s);
                ctx.lineTo(cx - s * 0.6, cy + s);
                ctx.lineTo(cx - s * 0.6, cy);
                ctx.lineTo(cx - s, cy);
                ctx.closePath();
                ctx.fill();
            } else if (icon === 'pause') {
                // Two bars
                const barW = s * 0.35;
                const gap = s * 0.25;
                ctx.fillRect(cx - gap - barW, cy - s, barW, s * 2);
                ctx.fillRect(cx + gap, cy - s, barW, s * 2);
            } else if (icon === 'play') {
                // Triangle
                ctx.beginPath();
                ctx.moveTo(cx - s * 0.5, cy - s);
                ctx.lineTo(cx + s, cy);
                ctx.lineTo(cx - s * 0.5, cy + s);
                ctx.closePath();
                ctx.fill();
            }
        }

        function drawUpgradeRow(x, y, w, h, upgrade, level, currency, player, index, color, hovered) {
            const maxLevel = 3;
            const isMaxed = level >= maxLevel;
            const cost = isMaxed ? 0 : upgrade.costs[level];
            const currencyType = upgrade.currency;
            const balance = currencyType === 'coins' ? currency.coins : currency.diamonds;
            const canAfford = !isMaxed && balance >= cost;
            const fontSize = Math.max(10, canvas.width * 0.008);

            // Row background
            ctx.fillStyle = hovered && canAfford ? 'rgba(68, 255, 136, 0.12)' : canAfford ? 'rgba(68, 255, 136, 0.05)' : 'rgba(255, 255, 255, 0.02)';
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 6);
            ctx.fill();

            // Key hint
            const keyLabel = player === 'p1' ? (index + 1).toString() : ['8', '9', '0', '-'][index];
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '700 ' + (fontSize * 0.9) + 'px Orbitron, monospace';
            ctx.fillStyle = canAfford ? color : COLORS.unaffordable;

            const keyBoxX = x + 6;
            const keyBoxSize = h * 0.6;
            const keyCy = y + h / 2;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.beginPath();
            ctx.roundRect(keyBoxX, keyCy - keyBoxSize / 2, keyBoxSize, keyBoxSize, 4);
            ctx.fill();

            ctx.fillStyle = canAfford ? color : COLORS.unaffordable;
            ctx.fillText(keyLabel, keyBoxX + keyBoxSize / 2, keyCy);

            // Name
            ctx.textAlign = 'left';
            ctx.font = '700 ' + fontSize + 'px Orbitron, monospace';
            ctx.fillStyle = canAfford ? 'rgba(255, 255, 255, 0.9)' : COLORS.unaffordable;
            ctx.fillText(upgrade.name, x + 6 + keyBoxSize + 8, keyCy - fontSize * 0.5);

            // Level pips
            const pipStartX = x + 6 + keyBoxSize + 8;
            const pipY = keyCy + fontSize * 0.5 + 2;
            const pipSize = 5;

            for (let l = 0; l < maxLevel; l++) {
                ctx.fillStyle = l < level ? color : 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.roundRect(pipStartX + l * (pipSize + 3), pipY, pipSize, pipSize, 1);
                ctx.fill();
            }

            // Cost
            ctx.textAlign = 'right';
            ctx.font = '700 ' + fontSize + 'px Orbitron, monospace';
            if (isMaxed) {
                ctx.fillStyle = color;
                ctx.fillText('MAX', x + w - 8, keyCy);
            } else {
                ctx.fillStyle = canAfford ? (currencyType === 'coins' ? COLORS.coin : COLORS.diamond) : COLORS.unaffordable;
                ctx.fillText(cost + (currencyType === 'coins' ? 'C' : 'D'), x + w - 8, keyCy);
            }

            ctx.textAlign = 'start';
        }

            const h = canvas.height;

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '900 ' + Math.max(48, w * 0.06) + 'px Orbitron, monospace';

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                ctx.font = '400 ' + Math.max(14, w * 0.014) + 'px Orbitron, monospace';
                ctx.fillStyle = COLORS.textDim;
                ctx.fillText('SPACE EDITION', w / 2, h / 2 - h * 0.03);

                if (Math.sin(state.time * 0.05) > 0) {
                    ctx.font = '700 ' + Math.max(16, w * 0.018) + 'px Orbitron, monospace';
                    ctx.fillStyle = COLORS.text;
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                    ctx.shadowBlur = 10;
                    const isMobile = w < 800;
                    ctx.fillText(isMobile ? 'TAP TO START' : 'PRESS SPACE TO LAUNCH', w / 2, h / 2 + h * 0.08);
                }

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.font = '400 ' + Math.max(11, w * 0.011) + 'px Orbitron, monospace';
                ctx.fillStyle = 'rgba(0, 212, 255, 0.6)';
                ctx.fillText('P1: W / S', w * 0.25, h * 0.85);
                ctx.fillStyle = 'rgba(255, 0, 170, 0.6)';
                ctx.fillText('P2: UP / DOWN', w * 0.75, h * 0.85);

                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            if (state.phase === 'MODE_SELECT') {
                drawModeSelect();
            }

            if (state.phase === 'GAME_OVER') {
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const isP1 = state.score.p1 >= WIN_SCORE;
                const winColor = isP1 ? COLORS.paddle1 : COLORS.paddle2;
                let winLabel;
                if (state.gameMode === '1P') {
                    winLabel = isP1 ? 'YOU WIN!' : 'AI WINS';
                } else {
                    winLabel = 'PLAYER ' + (isP1 ? '1' : '2') + ' WINS';
                }
                ctx.font = '900 ' + Math.max(48, w * 0.05) + 'px Orbitron, monospace';
                ctx.shadowColor = winColor;
                ctx.shadowBlur = 40;

                ctx.fillText(winLabel, w / 2, h / 2 - h * 0.05);

                ctx.shadowColor = 'transparent';

                    ctx.font = '700 ' + Math.max(16, w * 0.018) + 'px Orbitron, monospace';
                    ctx.fillStyle = COLORS.textDim;
                    const isMobile = w < 800;
                    ctx.fillText(isMobile ? 'TAP TO CONTINUE' : 'PRESS SPACE TO CONTINUE', w / 2, h / 2 + h * 0.06);
                }

                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }

            // Score flash during SCORED phase
            if (state.phase === 'SCORED' && state.pauseTimer > SCORED_PAUSE_FRAMES - 20) {
                const flashAlpha = ((state.pauseTimer - (SCORED_PAUSE_FRAMES - 20)) / 20) * 0.15;
                ctx.fillStyle = 'rgba(255, 255, 255, ' + flashAlpha + ')';
                ctx.fillRect(0, 0, w, h);
            }

            // Paused overlay
            if (state.phase === 'PAUSED') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';

                ctx.textBaseline = 'middle';

                ctx.shadowBlur = 20;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillText('PAUSED', w / 2, 100);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.textAlign = 'start';
                ctx.textBaseline = 'alphabetic';
            }
        }

        // --- Helpers ---
        function shiftColor(hex, amount) {
            const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
            const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
            const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        // --- Shop Input ---
        function handleShopInput() {
            for (let i = 0; i < UPGRADES.length; i++) {
                const up = UPGRADES[i];
                // Player 1
                if (consumeKey(up.key1) || isButtonClicked('upgrade_p1_' + i)) {
                    tryBuyUpgrade('p1', i);
                }
                // Player 2
                if (consumeKey(up.key2) || isButtonClicked('upgrade_p2_' + i)) {
                    tryBuyUpgrade('p2', i);
                }
            }
        }

        function tryBuyUpgrade(player, index) {
            const level = state.upgrades[player][index];
            if (level >= 3) return;
            const up = UPGRADES[index];
            const cost = up.costs[level];
            const curr = state.currency[player];
            const key = up.currency === 'coins' ? 'coins' : 'diamonds';
            if (curr[key] >= cost) {
                curr[key] -= cost;
                state.upgrades[player][index]++;
            }
        }

        function startGame(mode) {
            state.gameMode = mode;
            state.score.p1 = 0;
            state.score.p2 = 0;
            state.currency.p1.coins = 0;
            state.currency.p1.diamonds = 0;
            state.currency.p2.coins = 0;
            state.currency.p2.diamonds = 0;
            state.upgrades.p1 = [0, 0, 0, 0];
            state.upgrades.p2 = [0, 0, 0, 0];
            extraBalls.length = 0;
            ballTrail.length = 0;
            resetPaddlePositions();
            resetBall(Math.random() < 0.5 ? 1 : -1);
            state.phase = 'PLAYING';
        }

        // --- State Transitions ---
        function handleInput() {
            // Space or tap on title
            if (consumeKey('Space')) {
                if (state.phase === 'TITLE') {
                    state.phase = 'MODE_SELECT';
                } else if (state.phase === 'GAME_OVER') {
                    state.phase = 'TITLE';
                }
            }

            // Title screen: tap anywhere to go to mode select
            if (state.phase === 'TITLE' && mouse.clicked) {
                // Don't trigger if a button was clicked
                if (!isButtonHovered('mode1P') && !isButtonHovered('mode2P')) {
                    state.phase = 'MODE_SELECT';
                    mouse.clicked = false;
                }
            }

            // Mode select: keyboard shortcuts
            if (state.phase === 'MODE_SELECT') {
                if (consumeKey('Digit1')) {
                    startGame('1P');
                } else if (consumeKey('Digit2')) {
                    startGame('2P');
                }
            }

            // Mode select: button clicks / taps
            if (isButtonClicked('mode1P')) {
                startGame('1P');
            }
            if (isButtonClicked('mode2P')) {
                startGame('2P');
            }

            // Game over: tap anywhere
            if (state.phase === 'GAME_OVER' && mouse.clicked) {
                state.phase = 'TITLE';
                mouse.clicked = false;
            }

            // Escape to pause/unpause
            if (consumeKey('Escape')) {
                if (state.phase === 'PLAYING' || state.phase === 'SCORED') {
                    state.phaseBeforePause = state.phase;
                    state.phase = 'PAUSED';
                } else if (state.phase === 'PAUSED') {
                    state.phase = state.phaseBeforePause || 'PLAYING';
                } else if (state.phase === 'CONFIRM_HOME') {
                    state.phase = 'PAUSED';
                }
            }

            // Button clicks
            if (isButtonClicked('pause')) {
                if (state.phase === 'PLAYING' || state.phase === 'SCORED') {
                    state.phaseBeforePause = state.phase;
                    state.phase = 'PAUSED';
                } else if (state.phase === 'PAUSED') {
                    state.phase = state.phaseBeforePause || 'PLAYING';
                }
            }

            if (isButtonClicked('home')) {
                if (state.phase === 'PLAYING' || state.phase === 'SCORED' || state.phase === 'PAUSED') {
                    if (state.phase !== 'PAUSED') {
                        state.phaseBeforePause = state.phase;
                    }
                    state.phase = 'CONFIRM_HOME';
                }
            }

            if (isButtonClicked('confirmYes')) {
                state.phase = 'TITLE';
            }

            if (isButtonClicked('confirmNo')) {
                state.phase = 'PAUSED';
            }

            // Shop input during pause or scored
            if (state.phase === 'PAUSED' || state.phase === 'SCORED') {
                handleShopInput();
            }
        }

        // --- Game Loop ---
        function gameLoop() {
            state.time++;
            handleInput();

            if (state.phase === 'PLAYING') {
                updatePaddles();
                updateBall();
            }

            if (state.phase === 'SCORED') {
                updatePaddles();
                state.pauseTimer--;
                if (state.pauseTimer <= 0) {
                    state.phase = 'PLAYING';
                }
            }

            // --- Draw ---
            drawBackground();
            drawPaddles();

            if (state.phase === 'PLAYING' || state.phase === 'SCORED' || state.phase === 'PAUSED' || state.phase === 'CONFIRM_HOME') {
                drawBall();
                // Draw touch zone divider hint for 2P mobile
                if (state.gameMode === '2P' && canvas.width < 800) {
                    ctx.save();
                    ctx.setLineDash([8, 12]);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2, 60);
                    ctx.lineTo(canvas.width / 2, canvas.height);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }
            }

            drawUI();
            drawHUD();

            // Shop overlay during PAUSED or SCORED
            if (state.phase === 'PAUSED' || state.phase === 'SCORED') {
                drawShop();
            }

            // Confirm dialog
            if (state.phase === 'CONFIRM_HOME') {
                drawConfirmDialog();
            }

            // Reset click state at end of frame
            mouse.clicked = false;
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
